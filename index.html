<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>発表会用タイマー＆SEツール（記録機能付き）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #2a2a2a;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 { margin-top: 0; font-size: 24px; color: #00adb5; }
        .timer-display {
            font-size: 80px;
            font-family: monospace;
            font-weight: bold;
            margin: 20px 0;
            color: #eeeeee;
        }
        .btn {
            font-size: 18px;
            padding: 12px 24px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-start { background-color: #393e46; color: #00adb5; border: 2px solid #00adb5; }
        .btn-start:hover { background-color: #00adb5; color: #fff; }
        .btn-stop { background-color: #ff2e63; color: #fff; }
        .btn-stop:hover { background-color: #e02454; }
        .btn-reset { background-color: #4e54c8; color: #fff; }
        .btn-reset:hover { background-color: #3f44b3; }
        
        .se-section {
            margin-top: 40px;
            border-top: 1px solid #393e46;
            padding-top: 30px;
        }
        .se-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .btn-se {
            background-color: #393e46;
            color: #eeeeee;
            border: 1px solid #4e54c8;
            font-size: 16px;
            padding: 20px;
        }
        .btn-se:hover { background-color: #4e54c8; }
        .btn-se:active { transform: scale(0.98); }
        
        /* 記録ログ用のスタイル */
        .log-section {
            margin-top: 30px;
            border-top: 1px solid #393e46;
            padding-top: 20px;
            text-align: left;
        }
        .log-section h3 {
            text-align: center;
            color: #00adb5;
            margin-bottom: 10px;
        }
        .log-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
            background: #202020;
            border-radius: 8px;
            border: 1px solid #393e46;
        }
        .log-item {
            padding: 10px 15px;
            border-bottom: 1px solid #2a2a2a;
            font-family: monospace;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
        }
        .log-item:last-child { border-bottom: none; }
        .log-time { color: #00adb5; font-weight: bold; }
        .log-name { color: #eeeeee; }
        
        .hint { color: #888; font-size: 12px; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Presentation Timer & Sound Board</h1>
    
    <div class="timer-display" id="display">00:00.0</div>
    <div>
        <button class="btn btn-start" id="startBtn" onclick="startTimer()">スタート</button>
        <button class="btn btn-stop" onclick="stopTimer()">ストップ</button>
        <button class="btn btn-reset" onclick="resetTimer()">リセット</button>
    </div>

    <div class="se-section">
        <h3>効果音（キーボードの1〜4キー）</h3>
        <div class="se-grid">
            <button class="btn btn-se" onclick="playSE('ping', 'ピンポン (正解)')">1. ピンポン (正解)</button>
            <button class="btn btn-se" onclick="playSE('boo', 'ブブー (不正解)')">2. ブブー (不正解)</button>
            <button class="btn btn-se" onclick="playSE('cymbal', 'ジャジャーン')">3. ジャジャーン</button>
            <button class="btn btn-se" onclick="playSE('clap', '拍手')">4. 拍手</button>
        </div>
    </div>

    <div class="log-section">
        <h3>音源トリガー履歴 (タイムスタンプ)</h3>
        <ul class="log-list" id="logList">
            </ul>
    </div>
    
    <p class="hint">※スマホの場合は、最初に画面のどこかを1度タップしてからご使用ください。</p>
</div>

<script>
// タイマー用変数
let startTime;
let elapsedTime = 0;
let timerInterval;
let currentFormattedTime = "00:00.0"; // 現在のタイムを保持

function updateTime() {
    const time = Date.now() - startTime + elapsedTime;
    const mins = Math.floor(time / 60000).toString().padStart(2, '0');
    const secs = Math.floor((time % 60000) / 1000).toString().padStart(2, '0');
    const msecs = Math.floor((time % 1000) / 100).toString();
    currentFormattedTime = `${mins}:${secs}.${msecs}`;
    document.getElementById('display').textContent = currentFormattedTime;
}

function startTimer() {
    if (!timerInterval) {
        startTime = Date.now();
        timerInterval = setInterval(updateTime, 100);
        document.getElementById('startBtn').textContent = '計測中...';
    }
}

function stopTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
        elapsedTime += Date.now() - startTime;
        document.getElementById('startBtn').textContent = '再開';
    }
}

function resetTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    elapsedTime = 0;
    currentFormattedTime = "00:00.0";
    document.getElementById('display').textContent = '00:00.0';
    document.getElementById('startBtn').textContent = 'スタート';
    document.getElementById('logList').innerHTML = ''; // ログもリセット
}

// Web Audio API
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSE(type, displayName) {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    // 音を鳴らした時の時間をログに追加
    addLog(displayName);

    const now = audioCtx.currentTime;
    if (type === 'ping') {
        playTone(523.25, now, 0.15);
        playTone(659.25, now + 0.12, 0.4);
    } else if (type === 'boo') {
        playOscillator('sawtooth', 140, now, 0.15);
        playOscillator('sawtooth', 135, now + 0.2, 0.4);
    } else if (type === 'cymbal') {
        playTone(392.00, now, 0.5, 'triangle');
        playTone(587.33, now, 0.5, 'sawtooth');
        playNoise(now, 0.6);
    } else if (type === 'clap') {
        for (let i = 0; i < 15; i++) {
            playNoise(now + (i * 0.08) + Math.random()*0.03, 0.06);
        }
    }
}

// ログに記録を追加する関数
function addLog(name) {
    const logList = document.getElementById('logList');
    const li = document.createElement('li');
    li.className = 'log-item';
    
    // 現在のタイマーの時間を取得して表示
    li.innerHTML = `<span class="log-name">${name}</span><span class="log-time">[ ${currentFormattedTime} ]</span>`;
    
    // 最新の記録が一番上に来るように追加
    logList.insertBefore(li, logList.firstChild);
}

function playTone(freq, start, duration, type = 'sine') {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gainNode.gain.setValueAtTime(0.3, start);
    gainNode.gain.exponentialRampToValueAtTime(0.001, start + duration);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + duration);
}

// (中略) 以下のオーディオ生成関数は前回と同様です
function playOscillator(type, freq, start, duration) {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gainNode.gain.setValueAtTime(0.2, start);
    gainNode.gain.linearRampToValueAtTime(0.001, start + duration);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + duration);
}

function playNoise(start, duration) {
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1000;
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.15, start);
    gainNode.gain.exponentialRampToValueAtTime(0.001, start + duration);
    noise.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    noise.start(start);
    noise.stop(start + duration);
}

// キーボードショートカット
window.addEventListener('keydown', (e) => {
    if (e.key === '1') playSE('ping', 'ピンポン (正解)');
    if (e.key === '2') playSE('boo', 'ブブー (不正解)');
    if (e.key === '3') playSE('cymbal', 'ジャジャーン');
    if (e.key === '4') playSE('clap', '拍手');
});
</script>
</body>
</html>
